<!-- index.html -->
<!DOCTYPE html>
<html lang="lo">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐒'𝐒𝐨𝐦 𝐒𝐨𝐦𝐬𝐲 ເສື້ອຜ້າ - ເຄື່ອງໃຊ້</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="in.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Open Graph -->
    <meta property="og:title" content="ລາຍລະອຽດສິນຄ້າ | 𝐒'𝐒𝐨𝐦 𝐒𝐨𝐦𝐬𝐲" />
    <meta property="og:description" content="ເສື້ອຜ້າເນັ້ນ style ສາວອວບ - ເຄື່ອງໃຊ້" />
    <meta property="og:image" content="https://somsy-shop.github.io/shoping.github.io/img/logo1.png" />
    <meta property="og:url" content="https://somsy-shop.github.io/shoping.github.io/index.html" />
    <meta property="og:type" content="website" />
<link rel="icon" type="image/png" sizes="16x16" href="favicon.png">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo">
                <img src="img/logo1.png" style="width: 30px;" alt="">

                𝐒'𝐒𝐨𝐦 𝐒𝐨𝐦𝐬𝐲 ເສື້ອຜ້າ - ເຄື່ອງໃຊ້
                
            </a>
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="product.html" class="nav-link active">ສິນຄ້າ</a></li>
                <li><a href="contact.html" class="nav-link">ຕິດຕໍ່</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
       

        <main>
            <section class="filters-section">
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="ຄົ້ນຫາຈາກຊື່ສິນຄ້າຫຼືລະຫັດ SKU...">
                </div>

                <div class="filter-controls">
                    <div class="category-filter">
                        <h3>ໝວດໝູ່ສິນຄ້າ:</h3>
                        <div class="category-buttons" id="category-buttons">
                            <button class="category-btn active" data-category="all">ທັງໝົດ</button>
                            <!-- จะถูกเพิ่มโดย JavaScript -->
                        </div>
                    </div>


                </div>
            </section>

            <section class="products-section">
                <div class="products-header">
                    <h2>ສິນຄ້າທັງໝົດ</h2>
                    <div class="products-count">
                        <span id="product-count">0</span> ສິນຄ້າ
                        <span id="filter-info"></span>
                    </div>
                </div>

                <!-- เพิ่ม Filter Status -->
                <div class="filter-status" id="filter-status"
                    style="margin-bottom: 20px; padding: 10px; background: #f8f9fa; border-radius: 8px; display: none;">
                    <span id="active-filter"></span>
                    <button id="clear-filter" class="clear-filter-btn">
                        <i class="fas fa-times"></i> ລ້າງຕົວກອງ
                    </button>
                </div>

                <div class="products-grid" id="products-grid">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>ກຳລັງໂຫລດສິນຄ້າ...</p>
                    </div>
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination" style="display: none;">
                    <button id="prev-page" class="page-btn">
                        <i class="fas fa-chevron-left"></i> ກ່ອນໜ້າ
                    </button>
                    <div class="page-numbers" id="page-numbers"></div>
                    <button id="next-page" class="page-btn">
                        ຖັດໄປ <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2026 𝐒'𝐒𝐨𝐦 𝐒𝐨𝐦𝐬𝐲 ເສື້ອຜ້າ - ເຄື່ອງໃຊ້ Page</p>
            <div class="footer-info">
                <p><i class="fas fa-map-marker-alt"></i> ທີ່ຢູ່: ວຽງຈັນ, ລາວ</p>
                <p><i class="fas fa-phone"></i> whatsApp: +856 20 5454 4564</p>
            
            </div>
        </footer>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification">
        <i class="fas fa-check-circle"></i>
        <span id="notification-text"></span>
    </div>

    <script src="script.js"></script>
</body>

</html>
